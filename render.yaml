services:
  - type: web
    name: verigreen-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: ESG_CSR_INSECURE_SSL
        sync: false

  - type: web
    name: verigreen-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
